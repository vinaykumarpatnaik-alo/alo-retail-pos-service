name: Reusable Lambda Deploy

on:
  workflow_call:
    inputs:
      account_id:
        description: AWS account ID.
        required: true
        type: string
      region:
        description: AWS region.
        required: true
        type: string
      aws_github_action_role_name:
        description: IAM role name for GitHub Actions OIDC.
        required: true
        type: string
      app_name:
        description: Lambda function name.
        required: true
        type: string
      ecr_repo_name:
        description: ECR repository name.
        required: true
        type: string
      codedeploy_name:
        description: CodeDeploy application and deployment group prefix.
        required: true
        type: string
      lambda_alias:
        description: Lambda alias to update.
        required: false
        default: live
        type: string
      image_tag:
        description: Docker image tag.
        required: true
        type: string
      deploy_live:
        description: Deploy the built image to the Lambda alias.
        required: false
        default: true
        type: boolean
      build_runner:
        description: Runner label used for Lambda image builds.
        required: false
        default: ubuntu-arm64-8core
        type: string
      build_target:
        description: Docker build target.
        required: false
        default: deploy
        type: string
      docker_cache_scope:
        description: Optional GitHub Actions Buildx cache scope.
        required: false
        default: ""
        type: string
      build_args:
        description: Additional docker build args, one KEY=VALUE per line.
        required: false
        default: ""
        type: string
      codedeploy_hook_before_allow_traffic:
        description: Optional pre-traffic hook Lambda function name or ARN.
        required: false
        default: ""
        type: string
      codedeploy_hook_after_allow_traffic:
        description: Optional post-traffic hook Lambda function name or ARN.
        required: false
        default: ""
        type: string
      new_relic_entity_guid:
        description: Optional New Relic entity GUID.
        required: false
        default: ""
        type: string
      new_relic_entity_name:
        description: Optional New Relic entity name.
        required: false
        default: ""
        type: string
      new_relic_entity_region:
        description: Optional New Relic entity region.
        required: false
        default: ""
        type: string
    secrets:
      new_relic_license_key:
        description: Optional New Relic license key.
        required: false
      new_relic_api_key:
        description: Optional New Relic API key.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build & Push ${{ inputs.app_name }}
    runs-on: ${{ inputs.build_runner }}
    outputs:
      image_tag: ${{ steps.normalize-image-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Normalize Docker image tag
        id: normalize-image-tag
        shell: bash
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          SAFE_IMAGE_TAG="${IMAGE_TAG//\//-}"
          echo "image_tag=$SAFE_IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and Push Lambda Image
        uses: colorimageapparel/alo-actions/actions/lambda/build/v1@main
        with:
          account_id: ${{ inputs.account_id }}
          region: ${{ inputs.region }}
          aws_github_action_role_name: ${{ inputs.aws_github_action_role_name }}
          app_name: ${{ inputs.app_name }}
          ecr_repo_name: ${{ inputs.ecr_repo_name }}
          image_tag: ${{ steps.normalize-image-tag.outputs.image_tag }}
          docker_cache_scope: ${{ inputs.docker_cache_scope }}
          build_args: |
            BUILD_TAG=${{ steps.normalize-image-tag.outputs.image_tag }}
            ${{ inputs.build_args }}
          build_target: ${{ inputs.build_target }}
          new_relic_license_key: ${{ secrets.new_relic_license_key }}

  deploy:
    if: ${{ inputs.deploy_live }}
    name: Deploy ${{ inputs.app_name }}:${{ inputs.lambda_alias }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Deploy Lambda via CodeDeploy
        uses: colorimageapparel/alo-actions/actions/lambda/deploy/v1@main
        with:
          account_id: ${{ inputs.account_id }}
          region: ${{ inputs.region }}
          aws_github_action_role_name: ${{ inputs.aws_github_action_role_name }}
          app_name: ${{ inputs.app_name }}
          ecr_repo_name: ${{ inputs.ecr_repo_name }}
          codedeploy_name: ${{ inputs.codedeploy_name }}
          lambda_alias: ${{ inputs.lambda_alias }}
          codedeploy_hook_before_allow_traffic: ${{ inputs.codedeploy_hook_before_allow_traffic }}
          codedeploy_hook_after_allow_traffic: ${{ inputs.codedeploy_hook_after_allow_traffic }}
          new_relic_license_key: ${{ secrets.new_relic_license_key }}
          new_relic_api_key: ${{ secrets.new_relic_api_key }}
          new_relic_entity_guid: ${{ inputs.new_relic_entity_guid }}
          new_relic_entity_name: ${{ inputs.new_relic_entity_name }}
          new_relic_entity_region: ${{ inputs.new_relic_entity_region }}
