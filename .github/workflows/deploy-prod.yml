name: Deploy Prod

on:
  release:
    types:
      - published

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    secrets: inherit
    with:
      env_name: prod
      account_id: "418460385342"
