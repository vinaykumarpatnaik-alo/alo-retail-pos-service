name: Reusable Deploy Extensions

on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string
      account_id:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/gha-alo-retail-pos-service
          aws-region: us-east-1

      - name: Load Shopify extension deploy config
        shell: bash
        run: |
          SECRET_ID="/retail/alo-retail-pos-service/shopify-extension"
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ID" --query SecretString --output text)
          CLIENT_ID=$(jq -r '.clientId // empty' <<< "$SECRET_JSON")
          APP_AUTOMATION_TOKEN=$(jq -r '.appAutomationToken // empty' <<< "$SECRET_JSON")

          if [ -z "$CLIENT_ID" ] || [ -z "$APP_AUTOMATION_TOKEN" ]; then
            echo "Missing clientId or appAutomationToken in $SECRET_ID"
            exit 1
          fi

          echo "::add-mask::$APP_AUTOMATION_TOKEN"
          echo "SHOPIFY_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
          echo "SHOPIFY_APP_AUTOMATION_TOKEN=$APP_AUTOMATION_TOKEN" >> "$GITHUB_ENV"

      - name: Deploy extensions
        env:
          SHOPIFY_APP_ENV: ${{ inputs.env_name }}
        run: bun run deploy
