name: Reusable Deploy Extensions

on:
  workflow_call:
    inputs:
      env_name:
        description: Shopify app environment name.
        required: true
        type: string
      account_id:
        description: AWS account ID.
        required: true
        type: string
      aws_github_action_role_name:
        description: IAM role name for GitHub Actions OIDC.
        required: false
        default: gha-alo-retail-pos-service
        type: string
      node_version:
        description: Node.js version required by Shopify CLI.
        required: false
        default: "22.12.0"
        type: string
      bun_version:
        description: Bun version used by this repository.
        required: false
        default: "1.3.14"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Shopify Extensions
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun_version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.account_id }}:role/${{ inputs.aws_github_action_role_name }}
          aws-region: us-east-1

      - name: Load Shopify extension deploy secret
        uses: aws-actions/aws-secretsmanager-get-secrets@v3
        with:
          parse-json-secrets: false
          secret-ids: |
            SHOPIFY_EXTENSION_DEPLOY_SECRET,/retail/alo-retail-pos-service/shopify-extension

      - name: Export Shopify extension deploy config
        shell: bash
        run: |
          SECRET_ID="/retail/alo-retail-pos-service/shopify-extension"

          if ! jq -e 'type == "object"' <<< "$SHOPIFY_EXTENSION_DEPLOY_SECRET" >/dev/null; then
            echo "$SECRET_ID must be a JSON object"
            exit 1
          fi

          CLIENT_ID="$(jq -er '.clientId // empty' <<< "$SHOPIFY_EXTENSION_DEPLOY_SECRET")"
          APP_AUTOMATION_TOKEN="$(jq -er '.appAutomationToken // empty' <<< "$SHOPIFY_EXTENSION_DEPLOY_SECRET")"

          if [ -z "$CLIENT_ID" ] || [ -z "$APP_AUTOMATION_TOKEN" ]; then
            echo "Missing clientId or appAutomationToken in $SECRET_ID"
            exit 1
          fi

          echo "::add-mask::$APP_AUTOMATION_TOKEN"
          echo "SHOPIFY_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
          echo "SHOPIFY_APP_AUTOMATION_TOKEN=$APP_AUTOMATION_TOKEN" >> "$GITHUB_ENV"

      - name: Deploy extensions
        env:
          SHOPIFY_APP_ENV: ${{ inputs.env_name }}
        run: bun run deploy
