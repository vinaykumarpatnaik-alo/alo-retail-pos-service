name: Deploy Extensions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Shopify app environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
  push:
    branches:
      - main
    paths:
      - "extensions/**"
      - "packages/**"
      - "scripts/render-shopify-config.mjs"
      - "package.json"
      - "bun.lock"
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.env_name }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV_NAME="${{ inputs.environment }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            ENV_NAME="prod"
          else
            ENV_NAME="qa"
          fi

          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve-environment
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'pos-extensions/')
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.env_name }}
    concurrency:
      group: deploy-extensions-${{ needs.resolve-environment.outputs.env_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Render Shopify app config
        env:
          SHOPIFY_APP_ENV: ${{ needs.resolve-environment.outputs.env_name }}
          SHOPIFY_CLIENT_ID: ${{ needs.resolve-environment.outputs.env_name == 'dev' && secrets.SHOPIFY_RETAIL_POS_DEV_CLIENT_ID || needs.resolve-environment.outputs.env_name == 'qa' && secrets.SHOPIFY_RETAIL_POS_QA_CLIENT_ID || secrets.SHOPIFY_RETAIL_POS_PROD_CLIENT_ID }}
        run: bun run shopify:config

      - name: Deploy extensions
        env:
          SHOPIFY_APP_AUTOMATION_TOKEN: ${{ needs.resolve-environment.outputs.env_name == 'dev' && secrets.SHOPIFY_RETAIL_POS_DEV_AUTOMATION_TOKEN || needs.resolve-environment.outputs.env_name == 'qa' && secrets.SHOPIFY_RETAIL_POS_QA_AUTOMATION_TOKEN || secrets.SHOPIFY_RETAIL_POS_PROD_AUTOMATION_TOKEN }}
        run: bunx shopify app deploy --config shopify.app.generated.toml -f
