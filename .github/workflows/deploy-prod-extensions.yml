name: Deploy Prod Extensions

on:
  release:
    types:
      - published

concurrency:
  group: deploy-prod-extensions-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-extensions:
    if: ${{ startsWith(github.event.release.tag_name, 'pos-extensions/') || startsWith(github.event.release.tag_name, 'pos-full/') }}
    name: Deploy Prod Extensions
    uses: ./.github/workflows/reusable-deploy-extensions.yml
    secrets: inherit
    with:
      env_name: prod
      account_id: "418460385342"
