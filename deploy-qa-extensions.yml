name: Deploy QA Extensions

on:
  workflow_dispatch:
  push:
    branches:
      - "main*"
      - "QA*"
    paths:
      - ".github/workflows/deploy-qa-extensions.yml"
      - ".github/workflows/reusable-deploy-extensions.yml"
      - "extensions/**"
      - "packages/**"
      - "scripts/render-shopify-config.mjs"
      - "shopify.app*.toml"
      - "package.json"
      - "bun.lock"

concurrency:
  group: deploy-qa-extensions-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-extensions:
    name: Deploy QA Extensions
    uses: ./.github/workflows/reusable-deploy-extensions.yml
    secrets: inherit
    with:
      env_name: qa
      account_id: "058264160686"
